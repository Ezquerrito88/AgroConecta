version: '3.8'

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: agroconecta-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: agroconecta_db
      MYSQL_USER: agroconecta
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - agroconecta-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend Laravel
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agroconecta-backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_NAME=AgroConecta
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:axxGuLe2bj0yVFAVwM+yBPIX9w9bIoofolXuzY9HTks=
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=agroconecta_db
      - DB_USERNAME=agroconecta
      - DB_PASSWORD=secret
      - SESSION_DRIVER=cookie
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - RUN_MIGRATIONS=true
      - RUN_SEEDERS=false
    volumes:
      - backend-storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agroconecta-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Angular
  frontend:
    build:
      context: ./frontend-agro
      dockerfile: Dockerfile
    container_name: agroconecta-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      - API_URL=http://backend:80
    depends_on:
      - backend
    networks:
      - agroconecta-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  backend-storage:
    driver: local
  db-data:
    driver: local

networks:
  agroconecta-network:
    driver: bridge
