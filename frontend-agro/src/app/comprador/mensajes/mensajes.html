<div class="dashboard-layout">
  <app-sidebar-comprador />

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Mis Mensajes</h1>
        <p class="page-subtitle">Mensajes con vendedores</p>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <span class="material-symbols-rounded">search</span>
          <input
            type="text"
            placeholder="Buscar mensaje..."
            [(ngModel)]="searchQuery"
            (ngModelChange)="applyFilters()" />
          <button *ngIf="searchQuery" class="clear-search" (click)="searchQuery=''; applyFilters()">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
        <a class="icon-btn" routerLink="/comprador/favoritos" title="Favoritos">
          <span class="material-symbols-rounded">favorite</span>
        </a>
        <button class="icon-btn notif-btn" title="Notificaciones">
          <span class="material-symbols-rounded">notifications</span>
          <span class="notif-dot"></span>
        </button>
        <div class="user-chip">
          <div class="user-avatar">{{ userInitial }}</div>
          <span class="user-name">{{ firstName }}</span>
        </div>
      </div>
    </div>

    <app-chat></app-chat>
  </main>
</div>
