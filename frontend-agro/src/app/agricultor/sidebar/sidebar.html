<aside class="sidebar">

  <div class="sidebar-header">
    <img src="img/logo/logo.png" alt="AgroConecta" class="logo-img">
    <div class="brand-text">
      <h2>AgroConecta</h2>
      <span>Panel del Agricultor</span>
    </div>
  </div>

  <hr class="divider">

  <div class="user-profile">
    <div class="avatar">
      {{ initials }}
      <span class="status-dot"></span>
    </div>
    <div class="user-info">
      <h3>{{ user?.name }}</h3>
      <span>Finca El Paraíso</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li>
        <a routerLink="/agricultor/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
          <span class="material-symbols-rounded">Home</span>
          <span>Inicio</span>
        </a>
      </li>
      <li>
        <a routerLink="/agricultor/mis-productos" routerLinkActive="active">
          <span class="material-symbols-rounded">storefront</span>
          <span>Mis Productos</span>
        </a>
      </li>
      <li>
        <a routerLink="/agricultor/pedidos" routerLinkActive="active">
          <span class="material-symbols-rounded">receipt_long</span>
          <span>Pedidos</span>
        </a>
      </li>
      <li>
        <a routerLink="/agricultor/estadisticas" routerLinkActive="active">
          <span class="material-symbols-rounded">bar_chart</span>
          <span>Estadísticas</span>
        </a>
      </li>
      <li>
        <a routerLink="/agricultor/mensajes" routerLinkActive="active">
          <span class="material-symbols-rounded">chat_bubble</span>
          <span>Mensajes</span>
        </a>
      </li>
      <li>
        <a routerLink="/agricultor/configuracion" routerLinkActive="active">
          <span class="material-symbols-rounded">settings</span>
          <span>Configuración</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <hr class="divider">

    <a routerLink="/" class="btn-web">
      <span class="material-symbols-rounded">open_in_new</span>
      <span>Ir a la web</span>
    </a>
    <hr class="divider">
    <button class="logout-btn" (click)="logout()">
      <span class="material-symbols-rounded">logout</span>
      <span>Cerrar Sesión</span>
    </button>
  </div>

</aside>
