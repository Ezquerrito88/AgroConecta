<div class="dashboard-layout">
  <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="sidebarOpen = false"></div>
  <app-sidebar [(isOpen)]="sidebarOpen"></app-sidebar>

  <main class="main-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" (click)="toggleSidebar()" aria-label="Abrir menú">
          <span class="material-symbols-rounded">menu</span>
        </button>
        <h1 class="page-title">Mensajes</h1>
        <span class="page-subtitle">Mira tus mensajes</span>
      </div>

      <div class="topbar-right">
        <div class="search-box">
          <span class="material-symbols-rounded">search</span>
          <input type="text" placeholder="Buscar productos, pedidos…" />
        </div>
        <button class="icon-btn notif-btn" aria-label="Notificaciones">
          <span class="material-symbols-rounded">notifications</span>
        </button>
        <button class="icon-btn help-btn" aria-label="Ayuda">
          <span class="material-symbols-rounded">help</span>
        </button>
        <div class="user-chip">
          <div class="user-avatar">{{ user?.name?.charAt(0)?.toUpperCase() || '?' }}</div>
          <span class="user-name">{{ user?.name?.split(' ')[0] || 'Usuario' }}</span>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <app-chat></app-chat>

  </main>
</div>
